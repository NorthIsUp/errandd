<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="claraclawd — a friendly robot crab">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#1c6b6f"/>
      <stop offset="62%" stop-color="#0f3d42"/>
      <stop offset="100%" stop-color="#08262b"/>
    </radialGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8d76"/>
      <stop offset="100%" stop-color="#ef5d39"/>
    </linearGradient>
    <linearGradient id="arm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f86f4d"/>
      <stop offset="100%" stop-color="#df5230"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0ac" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffe0ac" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <!-- right-side legs (mirrored for the left) -->
    <g id="legsR" stroke="url(#arm)" stroke-width="15" stroke-linecap="round" fill="none">
      <path d="M338 296 q44 0 64 -14"/>
      <path d="M344 330 q46 6 70 0"/>
      <path d="M342 360 q44 16 64 28"/>
    </g>

    <!-- right-side arm + claw (mirrored for the left) -->
    <g id="armR">
      <path d="M330 258 Q382 232 404 178" stroke="url(#arm)" stroke-width="26" stroke-linecap="round" fill="none"/>
      <circle cx="406" cy="172" r="30" fill="url(#shell)"/>
      <!-- pincer: two prongs with an open mouth -->
      <path d="M406 172 L436 120" stroke="url(#shell)" stroke-width="20" stroke-linecap="round"/>
      <path d="M406 172 L388 116" stroke="url(#shell)" stroke-width="20" stroke-linecap="round"/>
      <circle cx="406" cy="172" r="8" fill="#d94e30" opacity="0.45"/>
    </g>
  </defs>

  <!-- background squircle -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="110" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- floor shadow -->
  <ellipse cx="256" cy="392" rx="126" ry="24" fill="#06181c" opacity="0.45" filter="url(#soft)"/>

  <!-- legs (behind shell) -->
  <use href="#legsR"/>
  <use href="#legsR" transform="matrix(-1 0 0 1 512 0)"/>

  <!-- shell / body -->
  <rect x="146" y="214" width="220" height="166" rx="70" fill="url(#shell)"/>
  <rect x="146" y="214" width="220" height="166" rx="70" fill="#ffffff" opacity="0.10" />
  <path d="M176 350 q80 28 160 0" stroke="#c9492c" stroke-width="6" stroke-linecap="round" opacity="0.35" fill="none"/>
  <!-- status LED (bot power light) -->
  <circle cx="256" cy="220" r="14" fill="#67e8c3" opacity="0.5" filter="url(#soft)"/>
  <circle cx="256" cy="220" r="6" fill="#9bf6dd"/>

  <!-- visor face -->
  <rect x="178" y="248" width="156" height="92" rx="42" fill="#082329"/>
  <rect x="186" y="256" width="140" height="40" rx="20" fill="#2a5a60" opacity="0.45"/>

  <!-- eyes -->
  <g>
    <circle cx="222" cy="296" r="22" fill="url(#eyeGlow)"/>
    <circle cx="290" cy="296" r="22" fill="url(#eyeGlow)"/>
    <circle cx="222" cy="296" r="15" fill="#fff3e2"/>
    <circle cx="290" cy="296" r="15" fill="#fff3e2"/>
    <circle cx="225" cy="298" r="6.5" fill="#0a2a2e"/>
    <circle cx="293" cy="298" r="6.5" fill="#0a2a2e"/>
    <circle cx="221" cy="293" r="2.6" fill="#ffffff"/>
    <circle cx="289" cy="293" r="2.6" fill="#ffffff"/>
  </g>
  <!-- friendly mouth -->
  <path d="M236 322 q20 14 40 0" stroke="#5eead4" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.85"/>

  <!-- arms + claws (in front, raised) -->
  <use href="#armR"/>
  <use href="#armR" transform="matrix(-1 0 0 1 512 0)"/>

  <!-- bubbles -->
  <circle cx="150" cy="150" r="10" fill="#bfeae6" opacity="0.45"/>
  <circle cx="176" cy="126" r="6" fill="#bfeae6" opacity="0.35"/>
</svg>
