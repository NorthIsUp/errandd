name: Tests

# Runs the full `bun test` suite (backend src/ + web/) on every PR and on master.
# Kept separate from web-quality.yml (which is path-filtered to the frontend);
# tests are cross-cutting, so they run regardless of which area changed.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test suite
        run: bun test
