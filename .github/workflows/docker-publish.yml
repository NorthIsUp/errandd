name: docker-publish

# Publishes the daemon image to GHCR. Builds multi-arch (amd64 + arm64)
# so the same tag works on Apple Silicon and Linux servers.
#
# Tags:
#   - `:latest` for pushes to master
#   - `:<short-sha>` for every build (master + manual)
#   - `:<tag>` when a git tag is pushed (e.g. v1.2.3)
#
# Authentication uses GITHUB_TOKEN (no separate PAT needed).

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `latest` only on master pushes, short SHA on every build, and the
          # full semver when a vN.N.N tag is pushed.
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./errandd
          file: ./errandd/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Speed up subsequent builds with registry-backed layer cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
