{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawdcode.fullname" . }}
  labels:
    {{- include "clawdcode.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- if .Values.secrets.webToken }}
  CLAWDCODE_WEB_TOKEN: {{ .Values.secrets.webToken | quote }}
  {{- end }}
{{- end }}
