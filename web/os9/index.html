<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClaudeClaw — Classic</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🦞</text></svg>' />
  <link rel="stylesheet" href="./app.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #999; overflow: hidden; }
    #root { height: 100vh; padding: 0; box-sizing: border-box; overflow: hidden; position: relative; z-index: 1; }
    #vanta-bg { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
    #vanta-bg > canvas { width: 100vw !important; height: 100vh !important; display: block; }
    /* Reset h margins — MenuBar uses <h3> labels and inherits browser default
       margin-block which inflates the bar to ~54px otherwise. */
    h1, h2, h3, h4, h5, h6 { margin: 0; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.fog.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.rings.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.trunk.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.halo.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.topology.min.js"></script>
</head>
<body>
  <div id="vanta-bg"></div>
  <div id="root"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
