<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>osish</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🖥️</text></svg>' />
  <link rel="stylesheet" href="./app.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #6a7a8a; overflow: hidden; font-family: "Charcoal", "Geneva", sans-serif; }
    #root { height: 100vh; overflow: hidden; }
    h1, h2, h3, h4, h5, h6 { margin: 0; }
    /* Desktop layer — windows are absolutely positioned inside .osish-desktop. */
    .osish-desktop { position: relative; flex: 1; width: 100vw; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    #root { display: flex; flex-direction: column; }
    .osish-win { position: absolute; }
    /* Window's native titlebar gets this class via Window's `classes` prop. */
    .osish-drag { cursor: grab; }
    .osish-drag:active { cursor: grabbing; }
    /* Window content area: hide native browser scrollbar so the lib's Scrollbar
       (rendered by LibScroll) is the only one visible. */
    .osish-content { overflow: hidden !important; padding: 0 !important; }
    /* Lib Scrollbar sizes to content by default — force it to fill the
       full height of its column so the bar reaches the bottom of the window.
       Drop its right border so it doesn't double-stack with the Window's
       right border (would render as a 2px black line). */
    .osish-scrollbar { height: 100% !important; border-right: 0 !important; }
    /* Classic desktop icon: no button chrome — just icon + label. */
    .osish-icon {
      width: 80px; padding: 4px; display: flex; flex-direction: column;
      align-items: center; gap: 2px; cursor: pointer; user-select: none;
      color: #fff; text-shadow: 1px 1px 0 #000;
      font-size: 11px; text-align: center; line-height: 1.2;
    }
    .osish-icon[data-selected="true"] .osish-icon-glyph {
      background: #000; /* classic inverted icon look */
    }
    .osish-icon[data-selected="true"] .osish-icon-label {
      background: #000; color: #fff; text-shadow: none; padding: 0 3px;
    }
    .osish-icon-glyph {
      width: 40px; height: 40px; display: flex;
      align-items: center; justify-content: center;
    }
  </style>
  <!-- Vanta animated backgrounds (used by the Background presets). -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.fog.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.rings.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.trunk.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.halo.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.topology.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
