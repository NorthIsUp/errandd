<!doctype html>
<html lang="en" data-theme="lobster">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <meta name="theme-color" content="#fff7f1">
        <title>ClawdCode</title>
        <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🦞</text></svg>'>
        <link rel="stylesheet" href="./app.css">
        <script>
    (function () {
      try {
        var v = localStorage.getItem("clawdcode:theme");
        var mode = v === "light" || v === "dark" ? v : "system";
        var light = localStorage.getItem("clawdcode:theme-light") || "lobster";
        var dark = localStorage.getItem("clawdcode:theme-dark") || "lobsterdark";
        var prefersDark = matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = mode === "dark" || (mode === "system" && prefersDark) ? dark : light;
        document.documentElement.setAttribute("data-theme", theme);
      } catch (_) {}
    })();
        </script>
    </head>
    <body class="min-h-screen bg-base-200 text-base-content">
        <div id="root"></div>
        <script type="module" src="./app.js"></script>
    </body>
</html>
