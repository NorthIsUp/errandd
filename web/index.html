<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClawdCode</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🦞</text></svg>' />
  <link rel="stylesheet" href="./app.css" />
  <style>
    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
    }
    /* Vanta sizes its <canvas> from the parent at init time. Force it to fill
       so it always matches the viewport, including under the scrollbar gutter. */
    #vanta-bg > canvas {
      width: 100vw !important;
      height: 100vh !important;
      display: block;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.fog.min.js"></script>
</head>
<body>
  <div id="vanta-bg"></div>
  <div id="root"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
